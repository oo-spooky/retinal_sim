name: cat

optical:
  pupil_shape: slit               # vertical slit pupil → anisotropic PSF
  pupil_diameter_mm: 2.0          # slit width in photopic
  pupil_height_mm: 7.0            # slit height in photopic
  axial_length_mm: 22.5
  focal_length_mm: 18.5
  corneal_radius_mm: 8.5
  lca_diopters: 1.5               # total span from 400 nm to 700 nm, focused at 555 nm
  media_transmission_table: cat_reference.csv
  zernike_coeffs: {}

retinal:
  cone_types: [S_cone, L_cone]    # dichromat — no M-cone
  cone_peak_wavelengths:
    S_cone: 450.0
    L_cone: 553.0
  rod_peak_wavelength: 501.0

  # Density model (Steinberg 1973)
  peak_cone_density_mm2: 10000
  peak_rod_density_mm2: 460000
  cone_density_scale_mm: 0.25     # small area centralis (~0.5mm diameter)
  rod_density_scale_mm: 3.0
  rod_free_zone_radius_mm: 0.0    # no rod-free zone

  # Cone type ratios (~5:95 S:L)
  cone_ratio:
    S_cone: 0.05
    L_cone: 0.95

  naka_rushton_params:
    S_cone: {n: 0.7, sigma: 0.5, R_max: 1.0}
    L_cone: {n: 0.7, sigma: 0.5, R_max: 1.0}
    rod:    {n: 1.0, sigma: 0.1, R_max: 1.0}

  provenance:
    lambda_max:
      source: Cat lambda-max anchors follow the project architecture/spec reference set and are used with the unchanged Govardovskii A1 nomogram.
      confidence: moderate
      notes: Fixed dichromat reference wavelengths; not individualized or adaptation-dependent sensitivity estimates.
    density_functions:
      source: Cat density falloff is a proof-of-concept Gaussian approximation referencing Steinberg 1973-style area-centralis and rod-density trends.
      confidence: moderate
      notes: The current model is radially symmetric by default even though cats have a stronger horizontal visual streak in vivo.
    naka_rushton:
      source: Cat Naka-Rushton parameters are configurable retinal-front-end model parameters stored in YAML.
      confidence: low
      notes: Defaults preserve prior proof-of-concept behavior and are not claimed as externally validated cat transduction fits.

  aperture_weighting:
    enabled: false
    gaussian_sigma_scale: 0.5
    sigma_bin_px: 0.1
    truncate_sigma: 3.0
    method: gaussian_prefilter
    notes: Optional retinal-front-end refinement; receptor apertures are approximated on the current irradiance grid rather than integrated in continuous space.

  visual_streak:
    supported: true
    enabled: false
    axis: horizontal
    axis_ratio: 2.0
    status: deferred
    notes: Cat mosaic anisotropy remains disabled by default because the current proof-of-concept density model is still a symmetric Gaussian fit rather than a dedicated visual-streak map.
