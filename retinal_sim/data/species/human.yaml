name: human

optical:
  pupil_shape: circular
  pupil_diameter_mm: 3.0          # photopic default
  axial_length_mm: 24.0
  focal_length_mm: 22.3
  corneal_radius_mm: 7.8
  lca_diopters: 2.0               # total span from 400 nm to 700 nm, focused at 555 nm
  media_transmission_table: human_reference.csv
  zernike_coeffs: {}

retinal:
  cone_types: [S_cone, M_cone, L_cone]
  cone_peak_wavelengths:
    S_cone: 420.0
    M_cone: 530.0
    L_cone: 560.0
  rod_peak_wavelength: 498.0

  # Density model: Gaussian falloff from area centralis (Curcio 1990)
  peak_cone_density_mm2: 200000
  peak_rod_density_mm2: 176000
  cone_density_scale_mm: 0.75     # Gaussian sigma for cone density falloff
  rod_density_scale_mm: 3.0       # rods peak parafoveally; simplified Gaussian
  rod_free_zone_radius_mm: 0.175  # 0.35mm diameter rod-free foveal pit

  # Cone type ratios at area centralis (S:M:L ~ 1:16:32)
  cone_ratio:
    S_cone: 0.020
    M_cone: 0.326
    L_cone: 0.654

  # Naka-Rushton {n, sigma, R_max} per receptor type
  naka_rushton_params:
    S_cone: {n: 0.7, sigma: 0.5, R_max: 1.0}
    M_cone: {n: 0.7, sigma: 0.5, R_max: 1.0}
    L_cone: {n: 0.7, sigma: 0.5, R_max: 1.0}
    rod:    {n: 1.0, sigma: 0.1, R_max: 1.0}

  provenance:
    lambda_max:
      source: Human lambda-max anchors follow the project architecture/spec reference set and are used with the unchanged Govardovskii A1 nomogram.
      confidence: moderate
      notes: Fixed species-reference peak wavelengths; not individualized or adaptation-dependent in-vivo fits.
    density_functions:
      source: Human density falloff is a proof-of-concept Gaussian approximation referencing Curcio 1990-style foveal/rod-free-zone anatomy.
      confidence: moderate
      notes: The current model is radially symmetric and patch-limited; it is not a full histological density map.
    naka_rushton:
      source: Human Naka-Rushton parameters are configurable retinal-front-end model parameters stored in YAML.
      confidence: low
      notes: Defaults preserve prior proof-of-concept behavior and should not be over-read as validated species-specific transduction measurements.

  aperture_weighting:
    enabled: false
    gaussian_sigma_scale: 0.5
    sigma_bin_px: 0.1
    truncate_sigma: 3.0
    method: gaussian_prefilter
    notes: Optional retinal-front-end refinement; many human cone apertures remain sub-pixel at the current proof-of-concept grid scale.

  visual_streak:
    supported: false
    enabled: false
    axis: horizontal
    axis_ratio: 1.0
    status: not_applicable
    notes: Human foveal modeling stays radially symmetric in this proof-of-concept build.
