name: dog

optical:
  pupil_shape: circular
  pupil_diameter_mm: 4.0          # photopic default
  axial_length_mm: 21.0
  focal_length_mm: 17.0
  corneal_radius_mm: 8.5
  lca_diopters: 1.5               # total span from 400 nm to 700 nm, focused at 555 nm
  media_transmission_table: dog_reference.csv
  zernike_coeffs: {}

retinal:
  cone_types: [S_cone, L_cone]    # dichromat — no M-cone
  cone_peak_wavelengths:
    S_cone: 429.0
    L_cone: 555.0
  rod_peak_wavelength: 506.0

  # Density model (Mowat 2008)
  peak_cone_density_mm2: 12000
  peak_rod_density_mm2: 400000
  cone_density_scale_mm: 1.5
  rod_density_scale_mm: 4.0
  rod_free_zone_radius_mm: 0.0    # no rod-free zone

  # Cone type ratios (~3:97 S:L)
  cone_ratio:
    S_cone: 0.03
    L_cone: 0.97

  naka_rushton_params:
    S_cone: {n: 0.7, sigma: 0.5, R_max: 1.0}
    L_cone: {n: 0.7, sigma: 0.5, R_max: 1.0}
    rod:    {n: 1.0, sigma: 0.1, R_max: 1.0}

  provenance:
    lambda_max:
      source: Dog lambda-max anchors follow the project architecture/spec reference set and are used with the unchanged Govardovskii A1 nomogram.
      confidence: moderate
      notes: Fixed dichromat reference wavelengths; not a full in-vivo sensitivity validation.
    density_functions:
      source: Dog density falloff is a proof-of-concept Gaussian approximation referencing Mowat 2008-style area-centralis and rod-density trends.
      confidence: moderate
      notes: The current model is radially symmetric by default even though dogs may have a weak visual streak.
    naka_rushton:
      source: Dog Naka-Rushton parameters are configurable retinal-front-end model parameters stored in YAML.
      confidence: low
      notes: Defaults preserve prior proof-of-concept behavior and are not presented as externally fitted dog phototransduction parameters.

  aperture_weighting:
    enabled: false
    gaussian_sigma_scale: 0.5
    sigma_bin_px: 0.1
    truncate_sigma: 3.0
    method: gaussian_prefilter
    notes: Optional retinal-front-end refinement; receptor apertures are approximated on the current irradiance grid rather than integrated in continuous space.

  visual_streak:
    supported: true
    enabled: false
    axis: horizontal
    axis_ratio: 1.5
    status: deferred
    notes: Dog mosaic anisotropy remains disabled by default to preserve the current radially symmetric proof of concept, but the config hook is present for future visual-streak fits.
